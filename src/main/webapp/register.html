<!DOCTYPE html>
<html>
<head>
    <title>Register - Employee Payroll</title>
    <meta charset="UTF-8">
    <style>
        body {
            /* Soft light gradient background: mint green to sky blue */
            background: linear-gradient(120deg, #a8edea, #fed6e3);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #0078d7;
            margin-bottom: 20px;
        }
        input {
            width: 85%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #0078d7;
            box-shadow: 0 0 5px rgba(0,120,215,0.4);
        }
        input[type="submit"] {
            background-color: #00bfa6; /* Soft teal green */
            color: white;
            border: none;
            cursor: pointer;
            width: 90%;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        input[type="submit"]:hover {
            background-color: #00997f; /* Darker teal on hover */
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>New User Registration</h2>
        <form action="RegisterServlet" method="post">
            <input type="text" name="username" placeholder="Enter Username" required><br>
            <input type="email" name="email" placeholder="Enter Email" required><br>
            <input type="password" name="password" placeholder="Enter Password" required><br>
            <input type="submit" value="Register">
        </form>
    </div>
</body>
</html>
