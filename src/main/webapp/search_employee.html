<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Employee</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb, #ebedee); /* Updated background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 85%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #aaa;
        }
        input[type="submit"], .home-btn {
            width: 90%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        .home-btn {
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            line-height: 1.5;
        }
        .home-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Search Employee</h2>
        <form action="SearchEmployeeServlet" method="post">
            <input type="text" name="empId" placeholder="Enter Employee ID" required><br>
            <input type="submit" value="Search">
        </form>
        <br>
        <a href="home.html" class="home-btn">Back to Home</a>
    </div>
</body>
</html>
