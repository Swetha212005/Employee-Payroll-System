<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Employee</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            /* Split background: top off-white, bottom pale green */
            background: #d4edda ;
            color: #000;
        }
        
        .container {
            width: 400px;
            margin: 50px auto;
            padding: 30px;
            background-color: rgba(0,0,0,0.6);
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
            color: #ffd700;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
            outline: none;
        }
        input[type="submit"] {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 5px;
            background-color: #ffd700;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        input[type="submit"]:hover {
            background-color: #ffbf00;
        }
        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #fff;
            background-color: #4CAF50;
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
    <script>
        function confirmDelete(event) {
            if(!confirm("Are you sure you want to delete this employee?")) {
                event.preventDefault(); // Stop form submission
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Delete Employee</h2>
        <form action="DeleteEmployeeServlet" method="post" onsubmit="confirmDelete(event)">
            Employee ID: <input type="text" name="empId" required><br>
            <input type="submit" value="Delete Employee">
        </form>
        <a href="home.html">Home</a>
    </div>
</body>
</html>
