<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Allowance & Salary Calculation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 450px;
            background: white;
            margin: 70px auto;
            padding: 25px 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: 500;
            color: #222;
        }

        input[type="text"], 
        input[type="number"], 
        input[type="email"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="text"]:focus, 
        input[type="number"]:focus {
            outline: none;
            border-color: #007bff;
        }

        .btn {
            display: block;
            width: 100%;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            padding: 10px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .note {
            margin-top: 10px;
            font-size: 13px;
            color: #555;
            text-align: center;
        }

        #totalSalary {
            background-color: #f9f9f9;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Employee Salary & Allowance Form</h2>
        <form action="AllowanceServlet" method="post" onsubmit="return validateForm()">

            <label for="empId">Employee ID</label>
            <input type="text" id="empId" name="empId" placeholder="Enter Employee ID" required>

            <label for="empName">Employee Name</label>
            <input type="text" id="empName" name="empName" placeholder="Enter Employee Name" required>

            <label for="department">Department</label>
            <input type="text" id="department" name="department" placeholder="Enter Department" required>

            <label for="overtimeHours">Overtime Hours</label>
            <input type="number" id="overtimeHours" name="overtimeHours" placeholder="e.g. 10" required>

            <label for="ratePerHour">Rate per Hour (₹)</label>
            <input type="number" id="ratePerHour" name="ratePerHour" placeholder="e.g. 200" required>

            <label for="medical">Medical Allowance (₹)</label>
            <input type="number" id="medical" name="medical" placeholder="e.g. 1500" required>

            <label for="bonus">Bonus (₹)</label>
            <input type="number" id="bonus" name="bonus" placeholder="e.g. 5000" required>

            <label for="other">Other Allowances (₹)</label>
            <input type="number" id="other" name="other" placeholder="e.g. 1000" required>

            <label for="totalSalary">Total Salary (₹)</label>
            <input type="number" id="totalSalary" name="totalSalary" readonly>

            <button type="button" class="btn" onclick="calculateSalary()">Calculate Salary</button>
            <input type="submit" class="btn" value="Save to Database">

        </form>

        <p class="note">Click “Calculate Salary” before saving the data.</p>
    </div>

    <script>
        function calculateSalary() {
            let overtimeHours = parseFloat(document.getElementById('overtimeHours').value) || 0;
            let ratePerHour = parseFloat(document.getElementById('ratePerHour').value) || 0;
            let medical = parseFloat(document.getElementById('medical').value) || 0;
            let bonus = parseFloat(document.getElementById('bonus').value) || 0;
            let other = parseFloat(document.getElementById('other').value) || 0;

            // Total salary calculation
            let total = (overtimeHours * ratePerHour) + medical + bonus + other;

            document.getElementById('totalSalary').value = total.toFixed(2);
        }

        function validateForm() {
            let totalSalary = document.getElementById('totalSalary').value;
            if (totalSalary === "" || totalSalary == 0) {
                alert("Please calculate the salary before submitting!");
                return false;
            }
            return true;
        }
    </script>

</body>
</html>
